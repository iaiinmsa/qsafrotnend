<div class="breadcrumb-card mb-25 d-md-flex align-items-center justify-content-between">
  <h5 class="mb-0">elaboracion de carnets</h5>
  <ol class="breadcrumb list-unstyled mt-0 mb-0 pl-0">
    <li class="breadcrumb-item position-relative">
      <a routerLink="/" class="d-inline-block position-relative">
        <i class="ri-home-8-line"></i> Dashboard
      </a>
    </li>
    <li class="breadcrumb-item position-relative">RRHH</li>
    <li class="breadcrumb-item position-relative">Elaboracion de Carnets</li>
  </ol>
</div>



<mat-card class="daxa-card mb-25 bg-white border-none d-block">
  <mat-card-header>
    <mat-card-title>

  

      <button mat-stroked-button color="primary" (click)="exportToExcel()">
        <mat-icon>file_download</mat-icon> Exportar a Excel
      </button>
    </mat-card-title>
    <mat-card-subtitle>
      <form class="search-box position-relative">
        <mat-form-field class="w-100">
          <mat-icon matPrefix>search</mat-icon>
          <input
            matInput
            placeholder="Buscar..."
            (keyup)="applyFilter($event)"
            class="input-search d-block w-100"
          />
        </mat-form-field>
      </form>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="isLoading" class="alert alert-info">Cargando datos...</div>
    <div *ngIf="!isLoading" class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef> codigo </th>
          <td mat-cell *matCellDef="let row">{{ row.codigo }}</td>
        </ng-container>

        <ng-container matColumnDef="fechaingreso">
          <th mat-header-cell *matHeaderCellDef> Fecha Ingreso </th>
          <td mat-cell *matCellDef="let row">{{ row.fechaingreso | date:'shortDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> nombre </th>
          <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
        </ng-container>

              <ng-container matColumnDef="posicion">
          <th mat-header-cell *matHeaderCellDef> posicion  </th>
          <td mat-cell *matCellDef="let row">{{ row.posicion }}</td>
        </ng-container>

        <ng-container matColumnDef="puesto">
          <th mat-header-cell *matHeaderCellDef> Puesto </th>
          <td mat-cell *matCellDef="let row">{{ row.puesto }}</td>
        </ng-container>

        <ng-container matColumnDef="dni">
          <th mat-header-cell *matHeaderCellDef> dni </th>
          <td mat-cell *matCellDef="let row">{{ row.dni }}</td>
        </ng-container>

       
       

        <ng-container matColumnDef="acciones">
  <th mat-header-cell *matHeaderCellDef> Acciones </th>
  <td mat-cell *matCellDef="let row">
    <!-- Botón de aprobar si calculated_days > 0 -->
    <button
      mat-button
      color="primary"
      (click)="generarCarnet(row.codigo)"
      [disabled]="loadingId === row.codigo"
    >
    <mat-icon *ngIf="loadingId !== row.codigo">check_circle</mat-icon>
      
      <span *ngIf="loadingId === row.codigo" class="spinner-border spinner-border-sm me-2"></span>
      
      {{ loadingId === row.codigo ? 'Generando...' : 'Generar Carnet' }}
     
    </button>

   
  



    
  </td>
</ng-container>



        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="8">No hay datos</td>
        </tr>
      </table>

      <mat-paginator
      [pageSizeOptions]="[5, 10, 20, 50]"
      [pageSize]="10"
      showFirstLastButtons 
  aria-label="Seleccionar página de empleados">
      ></mat-paginator>
    </div>
  </mat-card-content>


  
</mat-card>
