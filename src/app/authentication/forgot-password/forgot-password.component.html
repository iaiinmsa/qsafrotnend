<div class="forgot-password-area">
    <div class="d-table">
        <div class="d-table-cell">
            <div
                class="daxa-form ml-auto mr-auto border-radius bg-white"
                [class.card-borderd-theme]="themeService.isCardBorder()"
            >
                <div class="title text-center">
                    <h3>
                        ¿Olvidaste tu contraseña?
                    </h3>
                    <p class="ml-auto mr-auto">
                        Ingrese su correo electrónico y le enviaremos instrucciones para restablecer su contraseña.
                    </p>
                </div>

                <!-- Mensajes de feedback -->
                <div *ngIf="successMessage" class="alert alert-success text-center">
                    {{ successMessage }}
                </div>
                <div *ngIf="errorMessage" class="alert alert-danger text-center">
                    {{ errorMessage }}
                </div>

                <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label class="main-label d-block lh-1 text-black">
                            Correo
                        </label>
                        <mat-form-field>
                            <mat-label>
                                Ingrese su correo
                            </mat-label>
                            <input matInput type="email" formControlName="email">
                            <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">
                                Este campo es requerido
                            </mat-error>
                            <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
                                Ingrese un correo válido
                            </mat-error>
                        </mat-form-field>
                    </div>
                    <button mat-button class="btn" type="submit" [disabled]=" loading">
                        {{ loading ? 'Enviando...' : 'Enviar' }}
                    </button>
                    <div class="text-center back-to-sign-in">
                        <a mat-button routerLink="/authentication">
                            <i class="ri-arrow-left-s-line"></i>
                            Regresar a iniciar sesión
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
