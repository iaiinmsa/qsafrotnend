<div class="sign-in-area">
    <div class="d-table">
        <div class="d-table-cell">
            <div
                class="daxa-form ml-auto mr-auto border-radius bg-white"
                [class.card-borderd-theme]="themeService.isCardBorder()"
                [class.component-dark-theme]="themeService.isDark()"
                [class.rtl-enabled]="themeService.isRTLEnabled()"
            >
                <div class="title text-center">
                    <h3>
                        Inicia sesión en tu cuenta
                    </h3>
                    <p class="text-black">
                        ¿No tienes una cuenta? <a  class="text-daxa">Solcita una</a>
                    </p>
                </div>
                <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label class="main-label d-block lh-1 text-black">
                            Correo 
                        </label>
                        <mat-form-field class="w-100" appearance="outline">
                            <mat-label>
                                Ingrese correo 
                            </mat-label>
                            <input matInput type="email" id="email" formControlName="email">
                            <mat-error *ngIf="authForm.get('email')?.hasError('required') && authForm.get('email')?.touched">
                                Este campo es obligatorio.
                            </mat-error>
                            <mat-error *ngIf="authForm.get('email')?.hasError('email') && authForm.get('email')?.touched">
                                Por favor ingrrese un correo valido.
                            </mat-error>
                        </mat-form-field>
                    </div>
                    <div class="form-group">
                        <label class="main-label d-block lh-1 text-black">
                            Contraseña 
                        </label>
                        <mat-form-field class="w-100" appearance="outline">
                            <mat-label>
                                Ingrese su Contraseña 
                            </mat-label>
                            <input matInput [type]="hide ? 'password' : 'text'" id="password" formControlName="password">
                            <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide" type="button">
                                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                            </button>
                            <mat-error *ngIf="authForm.get('password')?.hasError('required') && authForm.get('password')?.touched">
                                Este campo es obligatorio.
                            </mat-error>
                            <mat-error *ngIf="authForm.get('password')?.hasError('minlength') && authForm.get('password')?.touched">
                                La contraseña debe tener al menos 8 caracteres.
                            </mat-error>
                        </mat-form-field>
                    </div>

                    <!-- Mensaje de Error de Login General -->
                    <div *ngIf="loginError" class="alert alert-danger mt-2 mb-3 text-center">
                        {{ loginError }}
                    </div>

                    <div class="info d-flex justify-content-between align-items-center">
                        <mat-checkbox formControlName="rememberMe">
                            Recordarme
                        </mat-checkbox>
                       <!--  <a 
                         routerLink="/authentication/forgot-password"     
                            class="d-inline-block text-daxa">
                            Olvide contraseña?
                        </a> --> 
                         <a      class="d-inline-block text-daxa">
                            Olvide contraseña?
                        </a>
                    </div>

                    


                    
                  
                    <button mat-raised-button color="primary" class="daxa-button text-white d-block w-100 mt-3" type="submit" [disabled]="isLoading ">
                        <span *ngIf="!isLoading">Iniciar sesión</span>
                        <span *ngIf="isLoading">Iniciando sesión...</span>
                    </button>

                            </span>

                            <button mat-icon-button type="button" class="linkedin" aria-label="Iniciar sesión con LinkedIn">

                            </button>
                        </div>
                    </div>
 -->   

                </form>
            </div>
        </div>
    </div>
</div>
